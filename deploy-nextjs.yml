name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main
      - feat/pinterest-design-system
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Next.js Site

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://jbpeoveltjtlhkjxteyy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpicGVvdmVsdGp0bGhranh0ZXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzU2MjEsImV4cCI6MjA5Njg1MTYyMX0.EcstVMHfHIYz54UPnwSEYY0DlG74eh0X53wuaOMZVnA
          NEXT_PUBLIC_SITE_URL: https://shivamanbhule477-cloud.github.io/4kwallpaper

      - name: Upload artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./out
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
